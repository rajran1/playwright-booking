name: Daily Booking

on:
  workflow_dispatch:

jobs:
  book-court:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Gate by America/Chicago 7:00 AM
        id: local_time_gate
        shell: bash
        run: |
          HOUR=$(TZ=America/Chicago date +%H)
          MINUTE=$(TZ=America/Chicago date +%M)
          if [[ "$HOUR" == "07" && "$MINUTE" == "00" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running booking job at local Chicago time 07:00"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run at local Chicago time ${HOUR}:${MINUTE}"
          fi

      - name: Run booking automation
        if: steps.local_time_gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          PLAYWRIGHT_HTML_OPEN: never
          BOOKING_USER_ID: ${{ secrets.BOOKING_USER_ID }}
          BOOKING_PASSWORD: ${{ secrets.BOOKING_PASSWORD }}
        run: npx playwright test tests/example.spec.ts --project=chromium --grep "@booking" --reporter=list --workers=1

      - name: Upload Playwright artifacts
        if: always() && (steps.local_time_gate.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            *.png
